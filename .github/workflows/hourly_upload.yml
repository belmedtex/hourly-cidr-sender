name: Ежечасная загрузка CIDR-списка на Яндекс.Диск

on:
  schedule:
    - cron: '0 * * * *'      # каждый час в 00 минут
  workflow_dispatch:          # возможность запуска вручную из интерфейса GitHub

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: pip install requests

      - name: Запуск скрипта
        env:
          YANDEX_DISK_TOKEN: ${{ secrets.YANDEX_DISK_TOKEN }}
        run: python upload_to_yadisk.py
