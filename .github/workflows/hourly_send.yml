name: Send CIDR list every hour

on:
  schedule:
    # Каждый час в 0 минут (по UTC)
    - cron: '0 * * * *'
  workflow_dispatch:   # Чтобы можно было запустить вручную из интерфейса GitHub

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python send_cidr.py
